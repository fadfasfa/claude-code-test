name: Auto-merge and Standby Reset

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [closed]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'issue_comment' &&
      github.event.action == 'created' &&
      github.event.issue.pull_request != null

    permissions:
      pull-requests: write
      contents: write
      checks: read
      issues: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug comment signal
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          ACTOR: ${{ github.actor }}
          COMMENT_LOGIN: ${{ github.event.comment.user.login }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          IS_PR_COMMENT: ${{ github.event.issue.pull_request != null }}
        run: |
          printf 'github.event_name=%s\n' "$EVENT_NAME"
          printf 'github.event.action=%s\n' "$EVENT_ACTION"
          printf 'github.actor=%s\n' "$ACTOR"
          printf 'comment.user.login=%s\n' "$COMMENT_LOGIN"
          printf 'comment.body=%s\n' "$COMMENT_BODY"
          printf 'is_pr_comment=%s\n' "$IS_PR_COMMENT"

      - name: Verify comment signal and bot identity
        shell: bash
        env:
          COMMENT_LOGIN: ${{ github.event.comment.user.login }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail

          if [[ "$COMMENT_LOGIN" != "codex[bot]" && "$COMMENT_LOGIN" != "chatgpt-codex-connector[bot]" ]]; then
            echo "::error::Comment author is not an allowed Codex bot identity: $COMMENT_LOGIN"
            exit 1
          fi

          if ! grep -qiE '\[AUDIT-VERDICT:[[:space:]]*PASS\]' <<<"$COMMENT_BODY"; then
            echo "::error::Missing PASS signal in Codex PR comment body."
            exit 1
          fi

      - name: Verify PR audit conditions
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          PR_JSON="$(gh pr view "$PR_NUMBER" --json isDraft,mergeable,mergeStateStatus,headRefOid,headRefName,title,number)"
          IS_DRAFT="$(jq -r '.isDraft' <<<"$PR_JSON")"
          MERGEABLE="$(jq -r '.mergeable' <<<"$PR_JSON")"
          MERGE_STATE_STATUS="$(jq -r '.mergeStateStatus' <<<"$PR_JSON")"
          HEAD_SHA="$(jq -r '.headRefOid' <<<"$PR_JSON")"
          HEAD_REF_NAME="$(jq -r '.headRefName' <<<"$PR_JSON")"
          PR_TITLE="$(jq -r '.title' <<<"$PR_JSON")"

          printf 'pr.number=%s\n' "$PR_NUMBER"
          printf 'pr.title=%s\n' "$PR_TITLE"
          printf 'pr.headRefName=%s\n' "$HEAD_REF_NAME"
          printf 'pr.headRefOid=%s\n' "$HEAD_SHA"
          printf 'pr.isDraft=%s\n' "$IS_DRAFT"
          printf 'pr.mergeable=%s\n' "$MERGEABLE"
          printf 'pr.mergeStateStatus=%s\n' "$MERGE_STATE_STATUS"

          if [ "$IS_DRAFT" = "true" ]; then
            echo "::error::PR is draft. Blocking auto-merge."
            exit 1
          fi

          if [ "$MERGEABLE" != "MERGEABLE" ] || [ "$MERGE_STATE_STATUS" != "CLEAN" ]; then
            echo "::error::PR is not ready to merge. mergeable=$MERGEABLE mergeStateStatus=$MERGE_STATE_STATUS"
            exit 1
          fi

          FAILED_CHECK_RUNS="$(gh api "repos/$REPOSITORY/commits/$HEAD_SHA/check-runs" \
            --jq '[.check_runs[] | select(.conclusion == "failure" or .conclusion == "cancelled" or .conclusion == "timed_out" or .conclusion == "startup_failure")] | length')"
          FAILED_STATUSES="$(gh api "repos/$REPOSITORY/commits/$HEAD_SHA/status" \
            --jq 'if .state == "failure" or .state == "error" then 1 else 0 end')"

          printf 'failed_check_runs=%s\n' "$FAILED_CHECK_RUNS"
          printf 'failed_statuses=%s\n' "$FAILED_STATUSES"

          if [ "$FAILED_CHECK_RUNS" -gt 0 ] || [ "$FAILED_STATUSES" -gt 0 ]; then
            echo "::error::Failed or cancelled checks detected. Blocking auto-merge."
            exit 1
          fi

      - name: Auto-merge PR
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          PR_JSON="$(gh pr view "$PR_NUMBER" --json headRefName,title)"
          HEAD_REF_NAME="$(jq -r '.headRefName' <<<"$PR_JSON")"
          PR_TITLE="$(jq -r '.title' <<<"$PR_JSON")"

          gh pr merge "${{ github.event.issue.number }}" \
            --merge \
            --delete-branch \
            --subject "auto-merge(${HEAD_REF_NAME}): ${PR_TITLE}"

  post-merge-reset:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout merged base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      # ── 硬条件：PR 必须是 Hextech 工作流 PR ──
      # 要求 PR 描述同时包含 workflow_id 和 agents_md_path: agents.md
      # agents_md_path 当前仅支持固定值 agents.md，不支持自定义路径
      - name: Verify PR is a Hextech workflow PR
        id: guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          PR_BODY=$(gh pr view "${{ github.event.pull_request.number }}" --json body --jq '.body // ""' | tr -d '\r')

          if [ -f agents.md ]; then
            ACTUAL_TASK_ID=$(grep -E '^task_id:[[:space:]]*' agents.md | head -n 1 | sed 's/^task_id:[[:space:]]*//' | tr -d '\r')
          else
            ACTUAL_TASK_ID=""
          fi

          if [ -n "$ACTUAL_TASK_ID" ]; then
            HAS_WORKFLOW_ID=$(echo "$PR_BODY" | grep -cE "^workflow_id:[[:space:]]*${ACTUAL_TASK_ID}[[:space:]]*$" || true)
          else
            HAS_WORKFLOW_ID=0
          fi
          
          HAS_AGENTS_PATH=$(echo "$PR_BODY" | grep -cE '^agents_md_path:[[:space:]]*agents\.md[[:space:]]*$' || true)

          if [ "$HAS_WORKFLOW_ID" -eq 0 ] || [ "$HAS_AGENTS_PATH" -eq 0 ]; then
            echo "::notice::PR description does not contain valid workflow_id and agents_md_path. Skipping standby reset."
            echo "is_hextech=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_hextech=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect workflow metadata
        id: meta
        if: steps.guard.outputs.is_hextech == 'true'
        shell: bash
        run: |
          if [ ! -f agents.md ]; then
            echo "has_agents=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          task_id=$(grep -E '^task_id:' agents.md | head -n 1 | sed 's/^task_id:[[:space:]]*//')
          [ -z "$task_id" ] && task_id="unknown-task-$(date +%Y%m%d%H%M%S)"
          executor=$(grep -E '^executor:' agents.md | head -n 1 | sed 's/^executor:[[:space:]]*//' | tr -d '[]')
          [ -z "$executor" ] && executor="unknown"
          echo "has_agents=true" >> "$GITHUB_OUTPUT"
          echo "task_id=$task_id" >> "$GITHUB_OUTPUT"
          echo "executor=$executor" >> "$GITHUB_OUTPUT"

      - name: Archive and reset agents.md
        if: steps.guard.outputs.is_hextech == 'true' && steps.meta.outputs.has_agents == 'true'
        shell: bash
        run: |
          mkdir -p .ai_workflow/agents_history
          archive_path=".ai_workflow/agents_history/${{ steps.meta.outputs.task_id }}.md"
          if [ -f "$archive_path" ]; then
            archive_path=".ai_workflow/agents_history/${{ steps.meta.outputs.task_id }}_${{ github.run_id }}.md"
          fi
          cp agents.md "$archive_path"

          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          TASK_ID="${{ steps.meta.outputs.task_id }}"
          # 生成与 agents_template.md 逐字同构的 standby 壳
          export NOW BASE_BRANCH TASK_ID archive_path
          python3 - <<'PY'
          import os
          from pathlib import Path
          from textwrap import dedent

          now = os.environ["NOW"]
          base_branch = os.environ["BASE_BRANCH"]
          task_id = os.environ["TASK_ID"]
          archive_path = os.environ["archive_path"]

          content = dedent(f"""## 工作范围 (agents.md) — Hextech
          > version: 5.3
          > status: standby
          > 本文件为长期任务总表；待机时保留最近一次合并的归档指针，供下次任务复用。
          > retrieval 任务默认不生成代码契约，但可按需写入轻量记录。

          ---

          ## 任务头（受控字段）

          task_id: none
          task_type: code
          execution_mode: ad-hoc
          branch_policy: on-demand
          branch_name: none
          base_branch: {base_branch}
          project_path: [待填写]
          executor: [待填写]
          status: standby
          created_at: {now}
          last_updated_at: {now}
          current_branch: none
          current_review_path: none

          Task_Mode: standard
          Contributors:
            - [待填写]

          ---

          ## 初始范围（尽量不改）

          initial_target_files:
            - none

          initial_modified_symbols:
            - none

          initial_goals:
            - [待填写]

          ---

          ## 当前有效范围（允许覆盖）

          effective_target_files:
            - none

          effective_modified_symbols:
            - none

          effective_goals:
            - [待填写]

          ---

          ## 运行台账（追加式）

          execution_ledger:
            - ts: {now}
              type: RESET_TO_STANDBY
              summary: "PR 合并后自动归档并回到 standby"
              files:
                - none

          ---

          ## Decision_Validation

          Final_Signer: self
          Validation_Sources:
            - none
          Validation_Result: skipped
          Human_Validation_Required: no
          Human_Validation_Reason: none

          ---

          ## 待机态（可复用壳）

          active_task_id: none
          last_merged_task_id: {task_id}
          last_merged_at: {now}
          default_base_branch: {base_branch}
          default_branch_policy_for_ad_hoc: on-demand
          merge_archive_path: {archive_path}
          """)

          Path("agents.md").write_text(content, encoding="utf-8", newline="\n")
          PY

      - name: Commit standby reset
        if: steps.guard.outputs.is_hextech == 'true' && steps.meta.outputs.has_agents == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add agents.md .ai_workflow/agents_history
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: reset agents to standby after merge [task-id: ${{ steps.meta.outputs.task_id }}]"
          git push origin HEAD:${{ github.event.pull_request.base.ref }}

      - name: Comment standby reset result
        if: steps.guard.outputs.is_hextech == 'true' && steps.meta.outputs.has_agents == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "仓库内 \`agents.md\` 已归档并重置为 standby（schema 与 agents_template.md 逐字同构）。

          归档位置：
          \`.ai_workflow/agents_history/${{ steps.meta.outputs.task_id }}.md\`

          本地对齐方式（二选一）：
          1. \`git pull\` 后若已配置 \`.git/hooks/post-merge\`，自动对齐。
          2. 手动运行 \`.ai_workflow/scripts/post-merge-sync.sh\`。"

      - name: Comment skip reason
        if: steps.guard.outputs.is_hextech != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "跳过 standby reset：PR 描述中未检测到 \`workflow_id\` 和 \`agents_md_path: agents.md\`，判定为非 Hextech 工作流 PR。"
