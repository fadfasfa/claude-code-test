name: Auto-merge and Standby Reset

on:
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [closed]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'approved' &&
      github.event.review.user.login == 'codex[bot]'

    permissions:
      pull-requests: write
      contents: write
      checks: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify AUDIT-VERDICT PASS
        run: |
          REVIEW_BODY="${{ github.event.review.body }}"
          if ! echo "$REVIEW_BODY" | grep -q '\[AUDIT-VERDICT: PASS\]'; then
            echo "::error::Codex approved but missing [AUDIT-VERDICT: PASS] signal in review body. Blocking auto-merge."
            exit 1
          fi

      - name: Verify PR is mergeable
        id: check_mergeable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          MERGEABLE=$(gh pr view "$PR_NUMBER" --json mergeable,mergeStateStatus \
            --jq '{mergeable: .mergeable, state: .mergeStateStatus}')
          MERGEABLE_VALUE=$(echo "$MERGEABLE" | jq -r '.mergeable')
          STATE_VALUE=$(echo "$MERGEABLE" | jq -r '.state')

          if [ "$MERGEABLE_VALUE" != "MERGEABLE" ] || [ "$STATE_VALUE" != "CLEAN" ]; then
            echo "::error::PR is not mergeable. mergeable=$MERGEABLE_VALUE, state=$STATE_VALUE"
            exit 1
          fi

      - name: Verify required checks passed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.event.pull_request.head.sha }}"
          FAILED=$(gh api "repos/${{ github.repository }}/commits/$SHA/check-runs" \
            --jq '[.check_runs[] | select(.conclusion == "failure" or .conclusion == "cancelled")] | length')
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED check run(s) failed or cancelled. Blocking auto-merge."
            exit 1
          fi

      - name: Auto-merge PR
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --merge \
            --delete-branch \
            --subject "auto-merge(${{ github.event.pull_request.head.ref }}): ${{ github.event.pull_request.title }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  post-merge-reset:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout merged base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      # ── 硬条件：PR 必须是 Hextech 工作流 PR ──
      # 要求 PR 描述同时包含 workflow_id 和 agents_md_path: agents.md
      # agents_md_path 当前仅支持固定值 agents.md，不支持自定义路径
      - name: Verify PR is a Hextech workflow PR
        id: guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          PR_BODY=$(gh pr view "${{ github.event.pull_request.number }}" --json body --jq '.body // ""' | tr -d '\r')

          if [ -f agents.md ]; then
            ACTUAL_TASK_ID=$(grep -E '^task_id:[[:space:]]*' agents.md | head -n 1 | sed 's/^task_id:[[:space:]]*//' | tr -d '\r')
          else
            ACTUAL_TASK_ID=""
          fi

          if [ -n "$ACTUAL_TASK_ID" ]; then
            HAS_WORKFLOW_ID=$(echo "$PR_BODY" | grep -cE "^workflow_id:[[:space:]]*${ACTUAL_TASK_ID}[[:space:]]*$" || true)
          else
            HAS_WORKFLOW_ID=0
          fi
          
          HAS_AGENTS_PATH=$(echo "$PR_BODY" | grep -cE '^agents_md_path:[[:space:]]*agents\.md[[:space:]]*$' || true)

          if [ "$HAS_WORKFLOW_ID" -eq 0 ] || [ "$HAS_AGENTS_PATH" -eq 0 ]; then
            echo "::notice::PR description does not contain valid workflow_id and agents_md_path. Skipping standby reset."
            echo "is_hextech=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_hextech=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect workflow metadata
        id: meta
        if: steps.guard.outputs.is_hextech == 'true'
        shell: bash
        run: |
          if [ ! -f agents.md ]; then
            echo "has_agents=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          task_id=$(grep -E '^task_id:' agents.md | head -n 1 | sed 's/^task_id:[[:space:]]*//')
          [ -z "$task_id" ] && task_id="unknown-task-$(date +%Y%m%d%H%M%S)"
          executor=$(grep -E '^executor:' agents.md | head -n 1 | sed 's/^executor:[[:space:]]*//' | tr -d '[]')
          [ -z "$executor" ] && executor="unknown"
          echo "has_agents=true" >> "$GITHUB_OUTPUT"
          echo "task_id=$task_id" >> "$GITHUB_OUTPUT"
          echo "executor=$executor" >> "$GITHUB_OUTPUT"

      - name: Archive and reset agents.md
        if: steps.guard.outputs.is_hextech == 'true' && steps.meta.outputs.has_agents == 'true'
        shell: bash
        run: |
          mkdir -p .ai_workflow/agents_history
          archive_path=".ai_workflow/agents_history/${{ steps.meta.outputs.task_id }}.md"
          if [ -f "$archive_path" ]; then
            archive_path=".ai_workflow/agents_history/${{ steps.meta.outputs.task_id }}_${{ github.run_id }}.md"
          fi
          cp agents.md "$archive_path"

          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          TASK_ID="${{ steps.meta.outputs.task_id }}"

          # 生成与 agents_template.md 逐字同构的 standby 壳
          cat > agents.md <<EOF
## 工作范围 (agents.md) — Hextech
> version: 5.3
> status: standby
> 本文件为长期任务总表；待机时保留最近一次合并的归档指针，供下次任务复用。
> retrieval 任务默认不生成代码契约，但可按需写入轻量记录。

---

## 任务头（受控字段）

task_id: none
task_type: code
execution_mode: ad-hoc
branch_policy: on-demand
branch_name: none
base_branch: ${BASE_BRANCH}
project_path: [待填写]
executor: [待填写]
status: standby
created_at: ${NOW}
last_updated_at: ${NOW}
current_branch: none
current_review_path: none

Task_Mode: standard
Contributors:
  - [待填写]

---

## 初始范围（尽量不改）

initial_target_files:
  - none

initial_modified_symbols:
  - none

initial_goals:
  - [待填写]

---

## 当前有效范围（允许覆盖）

effective_target_files:
  - none

effective_modified_symbols:
  - none

effective_goals:
  - [待填写]

---

## 运行台账（追加式）

execution_ledger:
  - ts: ${NOW}
    type: RESET_TO_STANDBY
    summary: "PR 合并后自动归档并回到 standby"
    files:
      - none

---

## Decision_Validation

Final_Signer: self
Validation_Sources:
  - none
Validation_Result: skipped
Human_Validation_Required: no
Human_Validation_Reason: none

---

## 待机态（可复用壳）

active_task_id: none
last_merged_task_id: ${TASK_ID}
last_merged_at: ${NOW}
default_base_branch: ${BASE_BRANCH}
default_branch_policy_for_ad_hoc: on-demand
merge_archive_path: ${archive_path}
EOF

      - name: Commit standby reset
        if: steps.guard.outputs.is_hextech == 'true' && steps.meta.outputs.has_agents == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add agents.md .ai_workflow/agents_history
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: reset agents to standby after merge [task-id: ${{ steps.meta.outputs.task_id }}]"
          git push origin HEAD:${{ github.event.pull_request.base.ref }}

      - name: Comment standby reset result
        if: steps.guard.outputs.is_hextech == 'true' && steps.meta.outputs.has_agents == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "仓库内 \`agents.md\` 已归档并重置为 standby（schema 与 agents_template.md 逐字同构）。

          归档位置：
          \`.ai_workflow/agents_history/${{ steps.meta.outputs.task_id }}.md\`

          本地对齐方式（二选一）：
          1. \`git pull\` 后若已配置 \`.git/hooks/post-merge\`，自动对齐。
          2. 手动运行 \`.ai_workflow/scripts/post-merge-sync.sh\`。"

      - name: Comment skip reason
        if: steps.guard.outputs.is_hextech != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "跳过 standby reset：PR 描述中未检测到 \`workflow_id\` 和 \`agents_md_path: agents.md\`，判定为非 Hextech 工作流 PR。"
