<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hextech 极地枢纽 - 英雄海克斯矩阵</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #11111b;
            background-image: radial-gradient(circle at 50% 10%, rgba(137, 180, 250, 0.08), transparent 60%);
            color: #cdd6f4;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .glass-panel {
            background: rgba(30, 30, 46, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        /* 海克斯阶级竖条指示器 */
        .tier-prismatic {
            background: linear-gradient(180deg, #ecfeff 0%, #22d3ee 34%, #a78bfa 70%, #f8fafc 100%);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.08),
                0 0 12px rgba(34, 211, 238, 0.34),
                0 0 16px rgba(168, 85, 247, 0.18);
        }
        .tier-gold {
            background: linear-gradient(to bottom, #f8d66d, #c9830f);
            box-shadow: 0 0 8px rgba(202, 138, 4, 0.34);
        }
        .tier-silver {
            background: linear-gradient(to bottom, #d8e1ef, #64748b);
            box-shadow: 0 0 8px rgba(148, 163, 184, 0.18);
        }
        
        /* 列表悬浮高亮 */
        .list-row { transition: all 0.2s; }
        .list-row:hover { background-color: rgba(255, 255, 255, 0.05); transform: translateX(4px); border-radius: 0.5rem; }
    </style>
</head>
<body class="min-h-screen p-6">

    <nav class="max-w-6xl mx-auto mb-6 flex justify-between items-center">
        <a href="index_preview.html" class="text-gray-400 hover:text-white flex items-center space-x-2 transition-colors">
            <span class="text-xl">←</span> <span>返回大盘风云榜</span>
        </a>
        <div class="relative w-64">
            <input type="text" placeholder="快速切英雄 (如: ys)" 
                   class="w-full bg-[#181825] border border-gray-700 text-sm rounded-full py-1.5 px-4 text-white focus:outline-none focus:border-blue-500 transition-all">
        </div>
    </nav>

    <main class="max-w-6xl mx-auto">
        <header class="glass-panel rounded-2xl p-6 mb-8 flex items-center space-x-6 relative overflow-hidden">
            <div class="absolute right-0 top-0 bottom-0 w-1/2 opacity-20 bg-[url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Yasuo_0.jpg')] bg-cover bg-left"></div>
            
            <img src="https://ddragon.leagueoflegends.com/cdn/14.3.1/img/champion/Yasuo.png" class="w-20 h-20 rounded-xl border-2 border-yellow-500 shadow-[0_0_15px_rgba(234,179,8,0.3)] relative z-10">
            <div class="relative z-10">
                <div class="flex items-center space-x-3 mb-1">
                    <h1 class="text-3xl font-black text-white">亚索</h1>
                    <span class="bg-gradient-to-r from-red-500 to-yellow-500 text-black font-bold text-xs px-2 py-0.5 rounded shadow">夯爆了 (T0)</span>
                </div>
                <div class="flex space-x-6 text-sm">
                    <p><span class="text-gray-400">贝叶斯胜率:</span> <span class="text-green-400 font-bold text-lg">58.2%</span></p>
                    <p><span class="text-gray-400">全服出场率:</span> <span class="text-white font-bold text-lg">15.4%</span></p>
                </div>
            </div>
        </header>

        <section class="glass-panel rounded-2xl p-6">
            
            <div class="flex space-x-2 border-b border-gray-800 pb-4 mb-6">
                <button class="px-5 py-2 rounded-lg bg-blue-600 text-white font-bold shadow-[0_0_10px_rgba(37,99,235,0.4)]">全部阶级 Top 20</button>
                <button class="px-5 py-2 rounded-lg text-gray-400 hover:text-white hover:bg-[#313244] font-medium transition-colors">🌈 棱彩专属</button>
                <button class="px-5 py-2 rounded-lg text-gray-400 hover:text-white hover:bg-[#313244] font-medium transition-colors">🥇 黄金专属</button>
                <button class="px-5 py-2 rounded-lg text-gray-400 hover:text-white hover:bg-[#313244] font-medium transition-colors">🥈 白银专属</button>
            </div>

            <div class="grid grid-cols-2 gap-8">
                
                <div>
                    <h2 class="text-lg font-bold text-blue-400 mb-4 flex items-center">
                        <span class="mr-2">🏆</span> 综合 Z-Score 推荐
                        <span class="ml-auto text-xs font-normal text-gray-500 uppercase tracking-widest">胜率与热度的完美平衡</span>
                    </h2>
                    
                    <div class="flex text-xs font-bold text-gray-500 border-b border-gray-800 pb-2 mb-2 px-2">
                        <div class="w-[55%]">排名 / 海克斯</div>
                        <div class="w-[20%] text-right">综合胜率</div>
                        <div class="w-[25%] text-right">出场率</div>
                    </div>

                    <div class="space-y-1">
                        <div class="list-row flex items-center justify-between p-2 border-b border-white/5">
                            <div class="flex items-center space-x-3 w-[55%]">
                                <span class="text-yellow-400 font-black w-4 text-right italic">1</span>
                                <div class="w-1.5 h-8 rounded-full tier-prismatic shrink-0"></div>
                                <img src="https://raw.communitydragon.org/latest/game/assets/ux/cherry/augments/icons/cherry_prismatic_pandorasitems.png" onerror="this.src='https://raw.communitydragon.org/latest/plugins/rcp-be-lol-game-data/global/default/v1/hextech-images/chest.png'" class="w-8 h-8 rounded-md border border-gray-700 shadow-sm object-cover bg-gray-900 shrink-0">
                                <span class="font-bold text-white truncate text-sm">潘多拉的装备</span>
                            </div>
                            <div class="w-[20%] text-right font-mono text-green-400 font-bold">59.8%</div>
                            <div class="w-[25%] text-right font-mono text-gray-400">8.2%</div>
                        </div>

                        <div class="list-row flex items-center justify-between p-2 border-b border-white/5">
                            <div class="flex items-center space-x-3 w-[55%]">
                                <span class="text-gray-400 font-bold w-4 text-right italic">2</span>
                                <div class="w-1.5 h-8 rounded-full tier-gold shrink-0"></div>
                                <img src="https://raw.communitydragon.org/latest/game/assets/ux/cherry/augments/icons/cherry_gold_markofastorm.png" onerror="this.src='https://raw.communitydragon.org/latest/plugins/rcp-be-lol-game-data/global/default/v1/hextech-images/chest.png'" class="w-8 h-8 rounded-md border border-gray-700 shadow-sm object-cover bg-gray-900 shrink-0">
                                <span class="font-bold text-gray-200 truncate text-sm">风暴印记</span>
                            </div>
                            <div class="w-[20%] text-right font-mono text-green-500 font-bold">57.5%</div>
                            <div class="w-[25%] text-right font-mono text-white">15.1%</div>
                        </div>

                        <div class="list-row flex items-center justify-between p-2 border-b border-white/5">
                            <div class="flex items-center space-x-3 w-[55%]">
                                <span class="text-gray-400 font-bold w-4 text-right italic">3</span>
                                <div class="w-1.5 h-8 rounded-full tier-gold shrink-0"></div>
                                <img src="https://raw.communitydragon.org/latest/game/assets/ux/cherry/augments/icons/cherry_gold_lightningstrikes.png" onerror="this.src='https://raw.communitydragon.org/latest/plugins/rcp-be-lol-game-data/global/default/v1/hextech-images/chest.png'" class="w-8 h-8 rounded-md border border-gray-700 shadow-sm object-cover bg-gray-900 shrink-0">
                                <span class="font-bold text-gray-200 truncate text-sm">闪电打击</span>
                            </div>
                            <div class="w-[20%] text-right font-mono text-green-500 font-bold">56.2%</div>
                            <div class="w-[25%] text-right font-mono text-white">12.5%</div>
                        </div>
                    </div>
                </div>

                <div>
                    <h2 class="text-lg font-bold text-red-400 mb-4 flex items-center">
                        <span class="mr-2">📈</span> 纯胜率暴力榜
                        <span class="ml-auto text-xs font-normal text-gray-500 uppercase tracking-widest">绝活哥与天胡专属</span>
                    </h2>
                    
                    <div class="flex text-xs font-bold text-gray-500 border-b border-gray-800 pb-2 mb-2 px-2">
                        <div class="w-[55%]">排名 / 海克斯</div>
                        <div class="w-[20%] text-right">极值胜率</div>
                        <div class="w-[25%] text-right">出场率</div>
                    </div>

                    <div class="space-y-1">
                        <div class="list-row flex items-center justify-between p-2 border-b border-white/5">
                            <div class="flex items-center space-x-3 w-[55%]">
                                <span class="text-yellow-400 font-black w-4 text-right italic">1</span>
                                <div class="w-1.5 h-8 rounded-full tier-gold shrink-0"></div>
                                <img src="https://raw.communitydragon.org/latest/game/assets/ux/cherry/augments/icons/cherry_gold_ruthlessstrikes.png" onerror="this.src='https://raw.communitydragon.org/latest/plugins/rcp-be-lol-game-data/global/default/v1/hextech-images/chest.png'" class="w-8 h-8 rounded-md border border-gray-700 shadow-sm object-cover bg-gray-900 shrink-0">
                                <span class="font-bold text-white truncate text-sm">冷酷打击 (绝活)</span>
                            </div>
                            <div class="w-[20%] text-right font-mono text-cyan-400 font-bold">62.1%</div>
                            <div class="w-[25%] text-right font-mono text-red-400">0.8%</div>
                        </div>
                        
                        <div class="list-row flex items-center justify-between p-2 border-b border-white/5">
                            <div class="flex items-center space-x-3 w-[55%]">
                                <span class="text-gray-400 font-bold w-4 text-right italic">2</span>
                                <div class="w-1.5 h-8 rounded-full tier-prismatic shrink-0"></div>
                                <img src="https://raw.communitydragon.org/latest/game/assets/ux/cherry/augments/icons/cherry_prismatic_pandorasitems.png" onerror="this.src='https://raw.communitydragon.org/latest/plugins/rcp-be-lol-game-data/global/default/v1/hextech-images/chest.png'" class="w-8 h-8 rounded-md border border-gray-700 shadow-sm object-cover bg-gray-900 shrink-0">
                                <span class="font-bold text-gray-200 truncate text-sm">潘多拉的装备</span>
                            </div>
                            <div class="w-[20%] text-right font-mono text-green-400 font-bold">59.8%</div>
                            <div class="w-[25%] text-right font-mono text-gray-400">8.2%</div>
                        </div>
                    </div>
                </div>

            </div>
        </section>
    </main>
    <script>
        (async () => {
            try {
                const response = await fetch('/api/augment_icon_map', { cache: 'no-store' });
                if (!response.ok) return;
                const iconMap = await response.json();
                document.querySelectorAll('.list-row img').forEach((img) => {
                    const row = img.closest('.list-row');
                    if (!row) return;
                    const label = row.querySelector('span.font-bold.truncate')?.textContent?.trim();
                    if (label && iconMap[label]) {
                        img.src = iconMap[label];
                    }
                });
            } catch (_) {}
        })();
    </script>
</body>
</html>
