<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极地大乱斗 - 英雄 T 度榜</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 核心暗黑玻璃拟态背景 */
        body {
            background-color: #11111b;
            background-image: radial-gradient(circle at 50% 0%, rgba(137, 180, 250, 0.1), transparent 50%);
            color: #cdd6f4;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .glass-panel {
            background: rgba(30, 30, 46, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        /* 隐藏滚动条但保留功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* 英雄头像悬浮动效 */
        .champ-avatar {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .champ-avatar:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            border-color: #fff;
            z-index: 10;
        }
        /* 阶层专属色彩定义 (五层递进) */
        /* 夯 (神级 - 炫彩流光金/红) */
        .tier-op { background: linear-gradient(135deg, #ff4e50, #f9d423); color: #111; text-shadow: 0 1px 2px rgba(255,255,255,0.5); }
        /* 顶级 (强势 - 史诗紫/洋红) */
        .tier-s { background: linear-gradient(135deg, #c026d3, #db2777); color: white; }
        /* 人上人 (优秀 - 稀有蓝) */
        .tier-a { background: linear-gradient(135deg, #2563eb, #06b6d4); color: white; }
        /* npc (平庸/背景板 - 灰铁与黯淡绿) */
        .tier-npc { background: linear-gradient(135deg, #4b5563, #374151); color: #9ca3af; }
        /* 拉 (烂到流汤 - 剧毒暗红) */
        .tier-trash { background: linear-gradient(135deg, #7f1d1d, #450a0a); color: #f87171; border-right: 1px solid #7f1d1d; }
    </style>
</head>
<body class="min-h-screen p-6 pb-20">
    <!-- 顶部搜索栏 -->
    <header class="sticky top-0 z-50 glass border-b border-gray-700">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex items-center justify-between gap-4">
                <h1 class="text-xl font-bold text-purple-400 whitespace-nowrap">极地大乱斗 T 度榜</h1>
                <div class="flex-1 max-w-xl">
                    <input
                        type="text"
                        id="searchInput"
                        placeholder="搜索英雄..."
                        class="w-full px-4 py-2 rounded-lg glass text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-purple-500"
                    />
                </div>
                <div id="wsStatus" class="flex items-center gap-2 text-xs">
                    <span class="w-2 h-2 bg-gray-500 rounded-full"></span>
                    <span class="text-gray-400">连接中</span>
                </div>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        <!-- 五大阶层容器 -->
        <div id="tierContainer" class="space-y-6">
            <!-- 动态生成各阶层 -->
        </div>

        <!-- 暂无数据提示 -->
        <div id="noDataTip" class="hidden text-center py-20">
            <div class="text-gray-500 text-lg">暂无数据</div>
            <div class="text-gray-600 text-sm mt-2">请等待数据加载或检查后端服务</div>
        </div>

        <!-- 加载中动画 -->
        <div id="loadingSpinner" class="text-center py-20">
            <div class="inline-block w-12 h-12 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
            <div class="text-gray-400 mt-4">加载中...</div>
        </div>
    </main>

    <script>
        // ========== 配置 ==========
        // 修复本地直开 Bug：file: 协议下使用 localhost
        const API_BASE = window.location.protocol === 'file:' ? 'http://localhost:8000' : window.location.origin;
        const WS_URL = window.location.protocol === 'file:' ? 'ws://localhost:8000' : 'ws://' + (window.location.host || 'localhost:8000');

        // 五大阶层定义（按综合分数划分）
        const TIERS = [
            { id: 't0', name: '夯', enName: 'God Tier', cssClass: 'tier-op', minScore: 1.5 },
            { id: 't1', name: '顶级', enName: 'Top', cssClass: 'tier-s', minScore: 0.8 },
            { id: 't2', name: '人上人', enName: 'Elite', cssClass: 'tier-a', minScore: 0.3 },
            { id: 't3', name: 'npc', enName: 'Average', cssClass: 'tier-npc', minScore: -0.3 },
            { id: 't4', name: '拉', enName: 'Trash', cssClass: 'tier-trash', minScore: -Infinity }
        ];

        // 全局状态
        let allChampions = [];
        let ws = null;
        let reconnectTimer = null;

        // ========== 工具函数 ==========
        /**
         * 获取英雄头像 URL - 使用本地 assets 目录
         */
        function getChampionAvatar(champion) {
            const heroId = champion['英雄 ID'] || '';
            if (heroId) {
                return `/assets/${heroId}.png`;
            }
            // 降级：如果没有 ID，返回默认占位图
            return 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23333%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23666%22 font-size=%2240%22>?</text></svg>';
        }

        /**
         * 头像加载失败处理函数 - 直接显示默认底图
         */
        function handleAvatarError(imgElement, heroName) {
            // 避免重复执行
            if (imgElement.dataset.errorHandled === 'true') return;
            imgElement.dataset.errorHandled = 'true';
            // 展示占位图
            imgElement.src = 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23333%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23666%22 font-size=%2240%22>' + (heroName ? heroName[0] : '?') + '</text></svg>';
        }

        /**
         * 格式化数字显示
         */
        function formatPercent(num) {
            return (num * 100).toFixed(1) + '%';
        }

        function formatNumber(num, decimals = 2) {
            return num.toFixed(decimals);
        }

        /**
         * 根据分数获取阶层
         */
        function getTier(score) {
            for (const tier of TIERS) {
                if (score >= tier.minScore) {
                    return tier;
                }
            }
            return TIERS[TIERS.length - 1];
        }

        // ========== 渲染逻辑 ==========
        /**
         * 创建英雄头像卡片（预览版横向排列结构）
         */
        function createChampionCard(champion, index) {
            const avatarUrl = getChampionAvatar(champion);
            const wr = formatPercent(champion['贝叶斯胜率']);
            const pr = formatPercent(champion['英雄出场率']);

            // 生成详情页链接，附带 wr、pr、id、en 参数
            const detailUrl = `detail.html?hero=${encodeURIComponent(champion['英雄名称'])}&wr=${encodeURIComponent(wr)}&pr=${encodeURIComponent(pr)}&id=${encodeURIComponent(champion['英雄 ID'] || '')}&en=${encodeURIComponent(champion['英文名'] || '')}`;

            return `
                <a
                    href="${detailUrl}"
                    class="champ-avatar relative w-14 h-14 rounded-lg overflow-hidden border-2 border-transparent cursor-pointer block flex-shrink-0"
                    style="animation-delay: ${index * 50}ms"
                >
                    <img
                        src="${avatarUrl}"
                        alt="${champion['英雄名称']}"
                        class="w-full h-full object-cover bg-gray-800"
                        onerror="handleAvatarError(this, '${champion['英雄名称']}')"
                    />
                    <div class="absolute bottom-0 inset-x-0 bg-black/80 text-center text-[10px] font-bold text-yellow-400 py-0.5 backdrop-blur-sm">
                        ${wr}
                    </div>
                </a>
            `;
        }

        /**
         * 渲染各阶层列表（预览版横向排列结构）
         */
        function renderTiers(champions) {
            const container = document.getElementById('tierContainer');
            container.innerHTML = '';

            // 按分数排序
            const sorted = [...champions].sort((a, b) => b['综合分数'] - a['综合分数']);

            // 按阶层分组
            const tierGroups = {};
            TIERS.forEach(t => tierGroups[t.id] = []);

            sorted.forEach(champ => {
                const tier = getTier(champ['综合分数']);
                tierGroups[tier.id].push(champ);
            });

            // 渲染每个阶层（横向排列结构）
            TIERS.forEach(tier => {
                const champs = tierGroups[tier.id];
                if (champs.length === 0) return;

                // NPC 和拉阶层添加灰度效果
                const grayscaleClass = tier.id === 't3' ? 'grayscale-[30%]' : tier.id === 't4' ? 'grayscale-[70%] hover:grayscale-0' : '';
                const opacityClass = tier.id === 't3' ? 'opacity-80' : tier.id === 't4' ? 'opacity-60' : '';

                const tierHTML = `
                    <div class="flex bg-[#181825] rounded-xl border border-gray-800 shadow-lg overflow-hidden ${opacityClass} ${grayscaleClass}">
                        <div class="w-24 shrink-0 ${tier.cssClass} flex flex-col items-center justify-center font-bold text-xl shadow-[2px_0_10px_rgba(0,0,0,0.3)] z-10">
                            <span>${tier.name}</span>
                            <span class="text-[9px] opacity-80 mt-1 uppercase tracking-wider">${tier.enName}</span>
                        </div>
                        <div class="flex-1 p-3 flex flex-wrap gap-3">
                            ${champs.map((c, i) => createChampionCard(c, i)).join('')}
                        </div>
                    </div>
                `;
                container.innerHTML += tierHTML;
            });
        }

        /**
         * 搜索过滤
         */
        function filterChampions(searchTerm) {
            if (!searchTerm.trim()) {
                renderTiers(allChampions);
                return;
            }

            const filtered = allChampions.filter(c =>
                c['英雄名称'].toLowerCase().includes(searchTerm.toLowerCase())
            );

            if (filtered.length === 0) {
                document.getElementById('tierContainer').innerHTML = `
                    <div class="text-center py-20 text-gray-500">
                        没有找到匹配的英雄
                    </div>
                `;
            } else {
                renderTiers(filtered);
            }
        }

        // ========== 数据获取 ==========
        /**
         * 加载英雄数据
         */
        async function loadChampions() {
            const spinner = document.getElementById('loadingSpinner');
            const noData = document.getElementById('noDataTip');
            const container = document.getElementById('tierContainer');

            try {
                const response = await fetch(`${API_BASE}/api/champions`);
                if (!response.ok) throw new Error('HTTP error');

                const data = await response.json();

                if (!Array.isArray(data) || data.length === 0) {
                    spinner.classList.add('hidden');
                    noData.classList.remove('hidden');
                    return;
                }

                allChampions = data;
                spinner.classList.add('hidden');
                noData.classList.add('hidden');
                container.classList.remove('hidden');
                renderTiers(data);

            } catch (error) {
                console.error('加载英雄数据失败:', error);
                spinner.classList.add('hidden');
                noData.classList.remove('hidden');
                document.querySelector('#noDataTip .text-lg').textContent = '数据加载失败';
                document.querySelector('#noDataTip .text-sm').textContent = '请确保后端服务已启动';
            }
        }

        // ========== WebSocket 连接 ==========
        /**
         * 建立 WebSocket 连接
         */
        function connectWebSocket() {
            const wsStatus = document.getElementById('wsStatus');

            try {
                ws = new WebSocket(WS_URL + '/ws');

                ws.onopen = () => {
                    console.log('WebSocket 连接已建立');
                    wsStatus.innerHTML = `
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                        <span class="text-green-400">已连接</span>
                    `;
                };

                ws.onclose = () => {
                    console.log('WebSocket 连接已关闭');
                    wsStatus.innerHTML = `
                        <span class="w-2 h-2 bg-red-500 rounded-full"></span>
                        <span class="text-red-400">已断开</span>
                    `;
                    // 断线重连
                    reconnectTimer = setTimeout(connectWebSocket, 3000);
                };

                ws.onerror = (error) => {
                    console.error('WebSocket 错误:', error);
                };

                ws.onmessage = (event) => {
                    try {
                        const message = JSON.parse(event.data);
                        console.log('收到 WebSocket 消息:', message);

                        if (message.type === 'champion_update') {
                            console.log('收到英雄更新通知，英雄 IDs:', message.champion_ids);
                            // 简单处理：刷新当前页面数据
                            loadChampions();
                        } else if (message.type === 'data_updated') {
                            console.log('收到 CSV 数据更新通知，自动热重载...');
                            loadChampions();
                        }
                    } catch (e) {
                        console.error('解析 WebSocket 消息失败:', e);
                    }
                };

            } catch (error) {
                console.error('创建 WebSocket 连接失败:', error);
                reconnectTimer = setTimeout(connectWebSocket, 3000);
            }
        }

        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', () => {
            // 加载数据
            loadChampions();

            // 建立 WebSocket 连接
            connectWebSocket();

            // 绑定搜索事件
            document.getElementById('searchInput').addEventListener('input', (e) => {
                filterChampions(e.target.value);
            });
        });

        // 页面卸载时清理
        window.addEventListener('beforeunload', () => {
            if (reconnectTimer) clearTimeout(reconnectTimer);
            if (ws) ws.close();
        });
    </script>
</body>
</html>
