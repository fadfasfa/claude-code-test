<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hextech 极地枢纽 - 全英雄 T 度风云榜</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #11111b;
            background-image: radial-gradient(circle at 50% 0%, rgba(137, 180, 250, 0.1), transparent 50%);
            color: #cdd6f4;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .glass-panel {
            background: rgba(30, 30, 46, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* 阶层专属色彩定义 */
        .tier-op { background: linear-gradient(135deg, #ff4e50, #f9d423); color: #111; text-shadow: 0 1px 2px rgba(255,255,255,0.5); }
        .tier-s { background: linear-gradient(135deg, #c026d3, #db2777); color: white; }
        .tier-a { background: linear-gradient(135deg, #2563eb, #06b6d4); color: white; }
        .tier-npc { background: linear-gradient(135deg, #4b5563, #374151); color: #9ca3af; }
        .tier-trash { background: linear-gradient(135deg, #7f1d1d, #450a0a); color: #f87171; border-right: 1px solid #7f1d1d; }

        /* 英雄头像悬浮动效 */
        .champ-avatar {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .champ-avatar:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            border-color: #fff;
            z-index: 10;
        }

        /* 高亮可用英雄 */
        .champ-highlight {
            box-shadow: 0 0 15px 2px rgba(234, 179, 8, 0.6) !important;
            border-color: #facc15 !important;
            transform: translateY(-2px) scale(1.05);
            z-index: 20;
        }

        /* 自定义滚动条 */
        .scroll-container::-webkit-scrollbar { width: 8px; height: 8px; }
        .scroll-container::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); border-radius: 4px; }
        .scroll-container::-webkit-scrollbar-thumb { background: rgba(137, 180, 250, 0.3); border-radius: 4px; }
        .scroll-container::-webkit-scrollbar-thumb:hover { background: rgba(137, 180, 250, 0.5); }

        /* 加载动画 */
        .spinner {
            border: 4px solid rgba(59, 130, 246, 0.3);
            border-top-color: #3b82f6;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 搜索框 */
        .search-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body class="min-h-screen p-6 pb-20">

    <header class="max-w-5xl mx-auto mb-8 flex flex-col items-center justify-center space-y-6 mt-4">
        <div class="flex items-center space-x-3">
            <div class="w-3 h-3 rounded-full bg-green-400 shadow-[0_0_10px_#4ade80] animate-pulse"></div>
            <span class="font-black text-2xl tracking-widest text-white">HEXTECH <span class="text-blue-500">NEXUS</span></span>
        </div>

        <div class="relative w-full max-w-2xl group">
            <div class="absolute -inset-1 bg-gradient-to-r from-blue-600 to-purple-600 rounded-full blur opacity-25 group-hover:opacity-50 transition duration-1000 group-hover:duration-200"></div>
            <input type="text" id="searchInput" placeholder="搜英雄看海克斯... (支持拼音如：ys / 外号如：快乐风男)"
                   class="search-input relative w-full bg-[#181825] border-2 border-gray-700 text-lg rounded-full py-4 px-6 text-white placeholder-gray-500 transition-all shadow-xl">
            <span class="absolute right-6 top-4 text-2xl opacity-70">🔍</span>
        </div>
        <p class="text-xs text-gray-500 font-mono tracking-widest">实时数据已应用「微量贝叶斯平滑+Z-Score」提纯</p>

        <!-- WebSocket 状态 -->
        <div id="wsStatus" class="flex items-center space-x-2 text-xs">
            <span class="w-2 h-2 bg-gray-500 rounded-full"></span>
            <span class="text-gray-400">WS 待连接</span>
        </div>
    </header>

    <main class="max-w-5xl mx-auto space-y-3" id="tierContainer">
        <!-- 加载中 -->
        <div class="flex flex-col items-center justify-center py-20">
            <div class="spinner mb-4"></div>
            <div class="text-gray-400 font-bold tracking-widest">加载英雄数据中...</div>
        </div>
    </main>

    <script>
        // API 基础路径
        const API_BASE = window.location.protocol === 'file:' ? 'http://localhost:8000' : window.location.origin;
        const WS_URL = window.location.protocol === 'file:' ? 'ws://localhost:8000' : 'ws://' + (window.location.host || 'localhost:8000');

        // DDragon 版本号（动态获取，fallback 硬编码）
        let ddVersion = '14.3.1';
        fetch('https://ddragon.leagueoflegends.com/api/versions.json')
            .then(r => r.json())
            .then(v => { if (v && v[0]) ddVersion = v[0]; })
            .catch(() => {});

        // 全局状态
        let allChampions = [];
        let activeChampionIds = new Set();
        let ws = null;

        // 五大阶层定义
        const TIERS = [
            { id: 't0', name: '夯', enName: 'God Tier', cssClass: 'tier-op', minScore: 1.5 },
            { id: 't1', name: '顶级', enName: 'Top', cssClass: 'tier-s', minScore: 0.8 },
            { id: 't2', name: '人上人', enName: 'Elite', cssClass: 'tier-a', minScore: 0.3 },
            { id: 't3', name: 'npc', enName: 'Average', cssClass: 'tier-npc', minScore: -0.3 },
            { id: 't4', name: '拉', enName: 'Trash', cssClass: 'tier-trash', minScore: -Infinity }
        ];

        // 英雄中文名到英文名的映射字典
        const CHAMPION_PINYIN = {
            '亚索': 'Yasuo', '永恩': 'Yone', '阿狸': 'Ahri', '阿卡丽': 'Akali',
            '卡莎': 'Kaisa', '伊泽瑞尔': 'Ezreal', '卢锡安': 'Lucian', '薇恩': 'Vayne',
            '金克丝': 'Jinx', '凯特琳': 'Caitlyn', '艾希': 'Ashe', '烬': 'Jhin',
            '拉克丝': 'Lux', '盲僧': 'LeeSin', '李青': 'LeeSin',
            '劫': 'Zed', '泰隆': 'Talon', '卡特琳娜': 'Katarina',
            '盖伦': 'Garen', '德莱厄斯': 'Darius', '诺手': 'Darius', '腕豪': 'Sett',
            '提莫': 'Teemo', '崔丝塔娜': 'Tristana', '小炮': 'Tristana',
            '维迦': 'Veigar', '小法师': 'Veigar', '吉格斯': 'Ziggs', '爆破鬼才': 'Ziggs',
            '凯南': 'Kennen', '慎': 'Shen', '暮光之眼': 'Shen',
            '阿木木': 'Amumu', '茂凯': 'Maokai', '大树': 'Maokai',
            '艾尼维亚': 'Anivia', '冰鸟': 'Anivia', '沃利贝尔': 'Volibear', '狗熊': 'Volibear',
            '古拉加斯': 'Gragas', '酒桶': 'Gragas', '特朗德尔': 'Trundle', '巨魔之王': 'Trundle',
            '沃里克': 'Warwick', '狼人': 'Warwick',
            '布里茨': 'Blitzcrank', '蒸汽机器人': 'Blitzcrank', '瑟提': 'Sett',
            '萨勒芬妮': 'Seraphine', '娑娜': 'Sona', '琴女': 'Sona',
            '卡尔玛': 'Karma', '天启者': 'Karma', '迦娜': 'Janna', '风女': 'Janna',
            '璐璐': 'Lulu', '基兰': 'Zilean', '时光守护者': 'Zilean',
            '黑默丁格': 'Heimerdinger', '大头': 'Heimerdinger',
            '卡萨丁': 'Kassadin', '马尔扎哈': 'Malzahar', '先知': 'Malzahar',
            '科加斯': 'Chogath', '大虫子': 'Chogath', '雷克顿': 'Renekton', '鳄鱼': 'Renekton',
            '内瑟斯': 'Nasus', '狗头': 'Nasus', '瑟庄妮': 'Sejuani', '猪妹': 'Sejuani',
            '布隆': 'Braum', '弗雷尔卓德之心': 'Braum', '丽桑卓': 'Lissandra', '冰裔': 'Lissandra',
            '艾翁': 'Ivern', '翠神': 'Ivern', '妮蔻': 'Neeko', '万花通灵': 'Neeko',
            '佐伊': 'Zoe', '暮光星灵': 'Zoe', '瑞兹': 'Ryze', '符文法师': 'Ryze',
            '卡莉丝塔': 'Kalista', '复仇之矛': 'Kalista', '莎弥拉': 'Samira', '沙漠玫瑰': 'Samira',
            '厄斐琉斯': 'Aphelios', '残月之肃': 'Aphelios', '赛娜': 'Senna', '涤魂圣枪': 'Senna',
            '奇亚娜': 'Qiyana', '元素女皇': 'Qiyana', '悠米': 'Yuumi', '魔法猫咪': 'Yuumi',
            '潘森': 'Pantheon', '不屈之枪': 'Pantheon',
            '佛耶戈': 'Viego', '破败之王': 'Viego', '格温': 'Gwen', '灵罗娃娃': 'Gwen',
            '阿克尚': 'Akshan', '影哨': 'Akshan', '薇古丝': 'Vex', '愁云使者': 'Vex',
            '泽丽': 'Zeri', '霓虹之女': 'Zeri', '卑尔维斯': 'Belveth', '女皇终结者': 'Belveth',
            '纳亚菲利': 'Naafiri', '百裂冥犬': 'Naafiri', '奎桑提': 'KSante', '纳祖芒': 'KSante',
            '奥瑞利安索尔': 'AurelionSol', '铸星龙王': 'AurelionSol', '龙王': 'AurelionSol',
            '蝎子': 'Skarner', '斯卡纳': 'Skarner',
        };

        // 初始化
        window.onload = () => {
            loadChampions();
            connectWS();
            setupSearch();
        };

        // 加载英雄数据
        async function loadChampions() {
            try {
                const res = await fetch(`${API_BASE}/api/champions`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                allChampions = await res.json();
                console.log('[INFO] 加载英雄数据成功，共', allChampions.length, '个英雄');
                renderTiers(allChampions);
            } catch (err) {
                console.error('[ERROR] 加载英雄数据失败:', err);
                document.getElementById('tierContainer').innerHTML = `
                    <div class="text-center py-20 text-red-400">
                        <div class="text-4xl mb-4">⚠️</div>
                        <div class="font-bold text-xl">数据加载失败</div>
                        <div class="text-sm mt-2">请确保后端服务已启动</div>
                    </div>
                `;
            }
        }

        // 渲染阶层
        function renderTiers(champions) {
            const container = document.getElementById('tierContainer');
            if (!container) return;

            // 按分数排序
            const sorted = [...champions].sort((a, b) => b['综合分数'] - a['综合分数']);

            // 按阶层分组
            const tierGroups = {};
            TIERS.forEach(t => tierGroups[t.id] = []);

            sorted.forEach(champ => {
                const tier = getTier(champ['综合分数']);
                tierGroups[tier.id].push(champ);
            });

            // 渲染 HTML
            container.innerHTML = '';
            TIERS.forEach(tier => {
                const champs = tierGroups[tier.id];
                if (champs.length === 0) return;

                const grayscaleClass = tier.id === 't3' ? 'grayscale-[30%]' : tier.id === 't4' ? 'grayscale-[70%]' : '';
                const opacityClass = tier.id === 't3' ? 'opacity-80' : tier.id === 't4' ? 'opacity-60' : '';

                const champHTML = champs.map((c, i) => createChampionCard(c, i)).join('');

                container.innerHTML += `
                    <div class="flex bg-[#181825] rounded-xl border border-gray-800 shadow-lg overflow-hidden ${opacityClass} ${grayscaleClass}">
                        <div class="w-24 shrink-0 ${tier.cssClass} flex flex-col items-center justify-center font-bold text-xl shadow-[2px_0_10px_rgba(0,0,0,0.3)] z-10">
                            <span>${tier.name}</span>
                            <span class="text-[9px] opacity-80 mt-1 uppercase tracking-wider">${tier.enName}</span>
                        </div>
                        <div class="flex-1 p-3 flex flex-wrap gap-3">
                            ${champHTML}
                        </div>
                    </div>
                `;
            });
        }

        // 创建英雄卡片
        function createChampionCard(champion, index) {
            const heroId = champion['英雄 ID'] || '';
            const enName = champion['英文名'] || CHAMPION_PINYIN[champion['英雄名称']] || '';
            const wr = formatPercent(champion['贝叶斯胜率']);

            // 生成详情页链接
            const detailUrl = `detail.html?hero=${encodeURIComponent(champion['英雄名称'])}&wr=${encodeURIComponent(wr)}&pr=${encodeURIComponent(formatPercent(champion['英雄出场率']))}&id=${encodeURIComponent(heroId)}&en=${encodeURIComponent(enName)}`;

            // 检查是否在高亮集合中
            const isHighlighted = activeChampionIds.has(String(heroId)) ? 'champ-highlight' : '';

            // 头像 URL 优先级：ddragon > assets
            let avatarUrl;
            if (enName) {
                avatarUrl = `https://ddragon.leagueoflegends.com/cdn/${ddVersion}/img/champion/${enName}.png`;
            } else if (heroId) {
                avatarUrl = `./assets/${heroId}.png`;
            } else {
                avatarUrl = createPlaceholder(champion['英雄名称']);
            }

            return `
                <a
                    href="${detailUrl}"
                    class="champ-avatar relative w-14 h-14 rounded-lg overflow-hidden border-2 cursor-pointer block flex-shrink-0 ${isHighlighted}"
                    style="animation-delay: ${index * 30}ms"
                    title="${champion['英雄名称']} (${wr})"
                >
                    <img
                        src="${avatarUrl}"
                        alt="${champion['英雄名称']}"
                        class="w-full h-full object-cover bg-gray-800"
                        onerror="handleAvatarError(this, '${champion['英雄名称']}')"
                    />
                    <div class="absolute bottom-0 inset-x-0 bg-black/80 text-center text-[10px] font-bold text-yellow-400 py-0.5 backdrop-blur-sm">
                        ${wr}
                    </div>
                </a>
            `;
        }

        // 创建占位图
        function createPlaceholder(name) {
            const initial = name ? name[0] : '?';
            return `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23333' width='100' height='100'/><text x='50' y='55' text-anchor='middle' fill='%23666' font-size='40'>${initial}</text></svg>`;
        }

        // 头像加载失败处理
        function handleAvatarError(imgElement, heroName) {
            if (imgElement.dataset.errorHandled === 'true') return;
            imgElement.dataset.errorHandled = 'true';
            imgElement.src = createPlaceholder(heroName);
        }

        // 格式化百分比
        function formatPercent(num) {
            return (num * 100).toFixed(1) + '%';
        }

        // 获取阶层
        function getTier(score) {
            for (const tier of TIERS) {
                if (score >= tier.minScore) return tier;
            }
            return TIERS[TIERS.length - 1];
        }

        // WebSocket 连接
        function connectWS() {
            ws = new WebSocket(WS_URL + '/ws');
            const status = document.getElementById('wsStatus');

            ws.onopen = () => {
                status.innerHTML = '<span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span><span class="text-green-400">已连接</span>';
            };

            ws.onclose = () => {
                status.innerHTML = '<span class="w-2 h-2 bg-red-500 rounded-full"></span><span class="text-red-400">已断开</span>';
                setTimeout(connectWS, 3000);
            };

            ws.onmessage = (e) => {
                try {
                    const message = JSON.parse(e.data);
                    console.log('[WS] 收到消息:', message);

                    if (message.type === 'champion_update') {
                        // 更新可用英雄集合并重新渲染高亮
                        activeChampionIds = new Set(message.champion_ids.map(String));
                        renderTiers(allChampions);
                    } else if (message.type === 'data_updated') {
                        // CSV 数据更新，重新加载
                        console.log('[WS] 数据已更新，重新加载...');
                        loadChampions();
                    } else if (message.type === 'local_player_locked') {
                        // 本地玩家锁定英雄 -> 自动跳转详情页
                        const heroName = message.hero_name;
                        const championId = message.champion_id;
                        const heroData = allChampions.find(c => c['英雄名称'] === heroName);
                        if (heroData) {
                            const wr = formatPercent(heroData['贝叶斯胜率']);
                            const pr = formatPercent(heroData['英雄出场率']);
                            const enName = heroData['英文名'] || CHAMPION_PINYIN[heroName] || '';
                            const heroId = heroData['英雄 ID'] || '';

                            console.log('[WS] 本地玩家锁定:', heroName, '-> 自动跳转详情页');
                            // 自动跳转到详情页（带 auto=1 标记用于触发动画）
                            window.location.href = `detail.html?hero=${encodeURIComponent(heroName)}&wr=${encodeURIComponent(wr)}&pr=${encodeURIComponent(pr)}&id=${encodeURIComponent(heroId)}&en=${encodeURIComponent(enName)}&auto=1`;
                        }
                    }
                } catch (err) {
                    console.error('[WS] 解析消息失败:', err);
                }
            };
        }

        // 搜索功能
        function setupSearch() {
            const input = document.getElementById('searchInput');
            if (!input) return;

            input.addEventListener('input', (e) => {
                const query = e.target.value.trim().toLowerCase();
                if (!query) {
                    renderTiers(allChampions);
                    return;
                }

                // 搜索匹配（支持中文名、英文名、拼音）
                const filtered = allChampions.filter(c => {
                    const name = c['英雄名称'] || '';
                    const enName = c['英文名'] || '';
                    // 检查是否在 CHAMPION_PINYIN 字典中（支持英文名 / 大写首字母缩写）
                    const pinyinMatch = Object.entries(CHAMPION_PINYIN).find(([cn, en]) => {
                        // 英文名前缀匹配
                        if (en.toLowerCase().startsWith(query)) return true;
                        // 大写字母首字母缩写匹配（如 LeeSin -> LS, ls）
                        const initials = en.replace(/[a-z]/g, '').toLowerCase();
                        if (initials && initials.startsWith(query)) return true;
                        // 中文别名匹配
                        if (cn.includes(query)) return true;
                        return false;
                    });

                    return name.toLowerCase().includes(query) ||
                           enName.toLowerCase().includes(query) ||
                           pinyinMatch;
                });

                renderTiers(filtered);
            });
        }
    </script>
</body>
</html>
