<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Canvas 渲染器测试</title>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: Arial; padding: 20px; }
        h2 { color: #89b4fa; margin-top: 30px; }
        .test-group { margin: 20px 0; }
        .test-item { display: inline-block; margin: 10px; }
        img { border: 2px solid #444; border-radius: 8px; }
        .status { color: #a6e3a1; font-weight: bold; }
        .error { color: #f38ba8; }
    </style>
</head>
<body>
    <h1>🎨 Canvas 动态渲染引擎测试套件</h1>
    
    <h2>1️⃣ 英雄头像测试 (Avatar)</h2>
    <div class="test-group">
        <div class="test-item">
            <p>瑞文</p>
            <img id="test-avatar-1" src="" width="80" height="80" alt="测试英雄1">
        </div>
        <div class="test-item">
            <p>艾克</p>
            <img id="test-avatar-2" src="" width="80" height="80" alt="测试英雄2">
        </div>
        <div class="test-item">
            <p>娑娜</p>
            <img id="test-avatar-3" src="" width="80" height="80" alt="测试英雄3">
        </div>
    </div>

    <h2>2️⃣ 海克斯图标测试 (Hextech Icons)</h2>
    <div class="test-group">
        <div class="test-item">
            <p>棱彩 (闪电)</p>
            <img id="test-hextech-1" src="" width="32" height="32" alt="棱彩">
        </div>
        <div class="test-item">
            <p>黄金 (六边形)</p>
            <img id="test-hextech-2" src="" width="32" height="32" alt="黄金">
        </div>
        <div class="test-item">
            <p>白银 (圆形)</p>
            <img id="test-hextech-3" src="" width="32" height="32" alt="白银">
        </div>
    </div>

    <h2>3️⃣ 确定性测试 (Determinism)</h2>
    <div class="test-group">
        <p>相同的输入应生成相同的输出：</p>
        <div class="test-item">
            <p>瑞文 (第1次)</p>
            <img id="test-determ-1a" src="" width="80" height="80">
        </div>
        <div class="test-item">
            <p>瑞文 (第2次)</p>
            <img id="test-determ-1b" src="" width="80" height="80">
        </div>
        <div id="determ-result"></div>
    </div>

    <h2>📊 测试结果</h2>
    <div id="test-results" style="background: #2a2a2a; padding: 15px; border-radius: 8px; margin-top: 20px;">
        <p class="status">测试中...</p>
    </div>

    <script src="./canvas_fallback.js"></script>
    <script>
        function runTests() {
            const results = [];

            // Test 1: Avatar 生成
            try {
                const img1 = document.getElementById('test-avatar-1');
                handleAssetMissing(img1, '瑞文', 'avatar', '');
                results.push('✅ 英雄头像 1 (瑞文)');
            } catch (e) {
                results.push(`❌ 英雄头像 1: ${e.message}`);
            }

            try {
                const img2 = document.getElementById('test-avatar-2');
                handleAssetMissing(img2, '艾克', 'avatar', '');
                results.push('✅ 英雄头像 2 (艾克)');
            } catch (e) {
                results.push(`❌ 英雄头像 2: ${e.message}`);
            }

            try {
                const img3 = document.getElementById('test-avatar-3');
                handleAssetMissing(img3, '娑娜', 'avatar', '');
                results.push('✅ 英雄头像 3 (娑娜)');
            } catch (e) {
                results.push(`❌ 英雄头像 3: ${e.message}`);
            }

            // Test 2: Hextech Icons
            try {
                const hextech1 = document.getElementById('test-hextech-1');
                handleAssetMissing(hextech1, '测试', 'hextech', 'Prismatic');
                results.push('✅ 棱彩图标 (闪电)');
            } catch (e) {
                results.push(`❌ 棱彩图标: ${e.message}`);
            }

            try {
                const hextech2 = document.getElementById('test-hextech-2');
                handleAssetMissing(hextech2, '测试', 'hextech', 'Gold');
                results.push('✅ 黄金图标 (六边形)');
            } catch (e) {
                results.push(`❌ 黄金图标: ${e.message}`);
            }

            try {
                const hextech3 = document.getElementById('test-hextech-3');
                handleAssetMissing(hextech3, '测试', 'hextech', 'Silver');
                results.push('✅ 白银图标 (圆形)');
            } catch (e) {
                results.push(`❌ 白银图标: ${e.message}`);
            }

            // Test 3: Determinism
            try {
                const determ1a = document.getElementById('test-determ-1a');
                const determ1b = document.getElementById('test-determ-1b');
                handleAssetMissing(determ1a, '瑞文', 'avatar', '');
                handleAssetMissing(determ1b, '瑞文', 'avatar', '');
                
                const srcA = determ1a.src;
                const srcB = determ1b.src;
                
                if (srcA === srcB) {
                    results.push('✅ 确定性测试 (相同输入 = 相同输出)');
                } else {
                    results.push('❌ 确定性测试失败 (输出不一致)');
                }
            } catch (e) {
                results.push(`❌ 确定性测试: ${e.message}`);
            }

            // Display results
            const resultsDiv = document.getElementById('test-results');
            resultsDiv.innerHTML = '<h3>测试结果：</h3>' + 
                '<ul style="list-style: none; padding: 0;">' +
                results.map(r => `<li style="padding: 5px; font-family: monospace; ${r.startsWith('❌') ? 'color: #f38ba8' : 'color: #a6e3a1'}">${r}</li>`).join('') +
                '</ul>' +
                `<p style="margin-top: 10px; font-weight: bold;">通过率: ${results.filter(r => r.startsWith('✅')).length}/${results.length}</p>`;
        }

        window.addEventListener('load', runTests);
    </script>
</body>
</html>
