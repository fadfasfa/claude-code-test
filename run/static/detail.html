<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hextech 极地枢纽 - 英雄海克斯矩阵</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #11111b;
            background-image: radial-gradient(circle at 50% 10%, rgba(137, 180, 250, 0.08), transparent 60%);
            color: #cdd6f4;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .glass-panel {
            background: rgba(30, 30, 46, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        /* 海克斯阶级竖条指示器 */
        .tier-prismatic { background: linear-gradient(to bottom, #fde047, #ef4444); box-shadow: 0 0 8px rgba(239, 68, 68, 0.4); }
        .tier-gold { background: linear-gradient(to bottom, #facc15, #ca8a04); box-shadow: 0 0 8px rgba(202, 138, 4, 0.4); }
        .tier-silver { background: linear-gradient(to bottom, #cbd5e1, #64748b); }

        /* 列表悬浮高亮 */
        .list-row { transition: all 0.2s; }
        .list-row:hover { background-color: rgba(255, 255, 255, 0.05); transform: translateX(4px); border-radius: 0.5rem; }

        /* 自定义滚动条样式 (美化版) */
        .scroll-container::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .scroll-container::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }
        .scroll-container::-webkit-scrollbar-thumb {
            background: rgba(137, 180, 250, 0.3);
            border-radius: 4px;
            transition: background 0.2s;
        }
        .scroll-container::-webkit-scrollbar-thumb:hover {
            background: rgba(137, 180, 250, 0.5);
        }
        .scroll-container {
            scrollbar-width: thin;
            scrollbar-color: rgba(137, 180, 250, 0.3) rgba(0, 0, 0, 0.2);
        }

        /* 平滑滚动 */
        html { scroll-behavior: smooth; }

        /* 隐藏滚动条 (兼容旧版) */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 震动流光动画 */
        @keyframes autoLockFlash {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); transform: scale(1); border-color: transparent; }
            20% { box-shadow: 0 0 30px 5px rgba(59, 130, 246, 0.8); transform: scale(1.02); border-color: #3b82f6; }
            40% { transform: scale(0.99); }
            60% { transform: scale(1.01); }
            80% { box-shadow: 0 0 15px 2px rgba(59, 130, 246, 0.4); transform: scale(1); border-color: rgba(255, 255, 255, 0.05); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); transform: scale(1); border-color: rgba(255, 255, 255, 0.05); }
        }
        .anim-auto-lock {
            animation: autoLockFlash 0.8s ease-out forwards;
        }
    </style>
</head>
<body class="min-h-screen p-6">

    <nav class="max-w-6xl mx-auto mb-6 flex justify-between items-center">
        <a href="index.html" class="text-gray-400 hover:text-white flex items-center space-x-2 transition-colors">
            <span class="text-xl">←</span> <span>返回大盘风云榜</span>
        </a>
        <div id="wsStatus" class="flex items-center space-x-2 text-xs">
            <span class="w-2 h-2 bg-gray-500 rounded-full"></span>
            <span class="text-gray-400">WS 待连接</span>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto">
        <header class="glass-panel rounded-2xl p-6 mb-8 flex items-center space-x-6 relative overflow-hidden" id="mainHeader">
            <div id="headerBg" class="absolute right-0 top-0 bottom-0 w-1/2 opacity-20 bg-cover bg-left"></div>
            <img id="heroAvatar" src="" class="w-20 h-20 rounded-xl border-2 border-yellow-500 shadow-[0_0_15px_rgba(234,179,8,0.3)] relative z-10 bg-gray-900 object-cover">

            <div class="relative z-10">
                <div class="flex items-center space-x-3 mb-1">
                    <h1 id="heroName" class="text-3xl font-black text-white">加载中...</h1>
                </div>
                <div class="flex space-x-6 text-sm mt-2">
                    <p><span class="text-gray-400">贝叶斯胜率:</span> <span id="heroWR" class="text-green-400 font-bold text-lg">-</span></p>
                    <p><span class="text-gray-400">全服出场率:</span> <span id="heroPR" class="text-white font-bold text-lg">-</span></p>
                </div>
            </div>
        </header>

        <section class="glass-panel rounded-2xl p-6 min-h-[400px]">
            <div class="flex space-x-2 border-b border-gray-800 pb-4 mb-6">
                <button id="tab-all" onclick="switchView('all')" class="tab-btn px-5 py-2 rounded-lg bg-blue-600 text-white font-bold shadow-[0_0_10px_rgba(37,99,235,0.4)] transition-colors">全部阶级 Top 10</button>
                <button id="tab-Prismatic" onclick="switchView('Prismatic')" class="tab-btn px-5 py-2 rounded-lg text-gray-400 hover:text-white hover:bg-[#313244] font-medium transition-colors">🌈 棱彩专属</button>
                <button id="tab-Gold" onclick="switchView('Gold')" class="tab-btn px-5 py-2 rounded-lg text-gray-400 hover:text-white hover:bg-[#313244] font-medium transition-colors">🥇 黄金专属</button>
                <button id="tab-Silver" onclick="switchView('Silver')" class="tab-btn px-5 py-2 rounded-lg text-gray-400 hover:text-white hover:bg-[#313244] font-medium transition-colors">🥈 白银专属</button>
            </div>

            <div id="loadingSpinner" class="text-center py-20">
                <div class="inline-block w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                <div class="text-gray-400 mt-4 font-bold tracking-widest">提纯海克斯数据中...</div>
            </div>

            <div id="noDataTip" class="hidden text-center py-20">
                <div class="text-gray-500 text-xl font-bold">暂无有效海克斯战报</div>
                <div class="text-gray-600 text-sm mt-2">该阶级可能样本过少或被系统过滤</div>
            </div>

            <div id="dataContainer" class="grid grid-cols-2 gap-8 hidden">
                <div>
                    <h2 class="text-lg font-bold text-blue-400 mb-4 flex items-center">
                        <span class="mr-2">🏆</span> 综合 Z-Score 推荐
                        <span class="ml-auto text-xs font-normal text-gray-500 uppercase tracking-widest">胜率与热度的完美平衡</span>
                    </h2>
                    <div class="flex text-xs font-bold text-gray-500 border-b border-gray-800 pb-2 mb-2 px-2">
                        <div class="w-[55%]">排名 / 海克斯</div>
                        <div class="w-[20%] text-right">综合胜率</div>
                        <div class="w-[25%] text-right">出场率</div>
                    </div>
                    <div id="compList" class="space-y-1 scroll-container" style="max-height: 400px; overflow-y: auto;"></div>
                </div>

                <div>
                    <h2 class="text-lg font-bold text-red-400 mb-4 flex items-center">
                        <span class="mr-2">📈</span> 纯胜率暴力榜
                        <span class="ml-auto text-xs font-normal text-gray-500 uppercase tracking-widest">绝活哥与天胡专属</span>
                    </h2>
                    <div class="flex text-xs font-bold text-gray-500 border-b border-gray-800 pb-2 mb-2 px-2">
                        <div class="w-[55%]">排名 / 海克斯</div>
                        <div class="w-[20%] text-right">极值胜率</div>
                        <div class="w-[25%] text-right">出场率</div>
                    </div>
                    <div id="winList" class="space-y-1 scroll-container" style="max-height: 400px; overflow-y: auto;"></div>
                </div>
            </div>
        </section>

        <section class="glass-panel rounded-2xl p-6 mt-8">
            <h2 class="text-xl font-bold text-white mb-4">📚 英雄协同推荐</h2>
            <div id="synergyContainer" class="space-y-2">
                <div class="text-center py-10 text-gray-400">加载中...</div>
            </div>
        </section>
    </main>

    <script>
        // 修复本地直开 Bug：file: 协议下使用 localhost
        const API_BASE = window.location.protocol === 'file:' ? 'http://localhost:8000' : window.location.origin;
        const WS_URL = window.location.protocol === 'file:' ? 'ws://localhost:8000' : 'ws://' + (window.location.host || 'localhost:8000');
        let hextechData = null;
        let currentView = 'all';
        let synergyData = null;
        let ws = null;

        // 悬浮窗单例防多开管控
        const tabId = Math.random().toString(36).substring(2, 9);
        const bc = new BroadcastChannel('hextech_nexus_channel');
        bc.onmessage = (e) => {
            if (e.data.type === 'new_tab_opened' && e.data.id !== tabId) {
                document.body.innerHTML = '<div class="flex items-center justify-center h-screen text-gray-500 text-xl font-bold">✨ 已在新的悬浮窗中唤醒，本窗口已自动休眠。</div>';
                if (window.wsInstance) window.wsInstance.close();
            }
        };
        bc.postMessage({ type: 'new_tab_opened', id: tabId });

        // 解析 URL 参数并渲染头部
        const urlParams = new URLSearchParams(window.location.search);
        const hero = urlParams.get('hero');
        const enName = urlParams.get('en');
        const heroId = urlParams.get('id');
        const heroWR = urlParams.get('wr');
        const heroPR = urlParams.get('pr');
        const isAuto = urlParams.get('auto');

        // 渲染头部数据
        if(hero) document.getElementById('heroName').textContent = hero;
        if(heroWR) document.getElementById('heroWR').textContent = heroWR;
        if(heroPR) document.getElementById('heroPR').textContent = heroPR;

        // 渲染背景原画和头像 - 使用 ddragon 高清资源
        if(enName) {
            document.getElementById('headerBg').style.backgroundImage = `url('https://ddragon.leagueoflegends.com/cdn/img/champion/splash/${enName}_0.jpg')`;
            document.getElementById('heroAvatar').src = `https://ddragon.leagueoflegends.com/cdn/14.3.1/img/champion/${enName}.png`;
        } else if(heroId) {
            document.getElementById('heroAvatar').src = `/assets/${heroId}.png`;
        } else {
            document.getElementById('headerBg').style.backgroundColor = '#181825';
            document.getElementById('heroAvatar').src = 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23333%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23666%22 font-size=%2240%22>?</text></svg>';
        }

        // 判断是否触发动画
        if (isAuto === '1') {
            document.getElementById('mainHeader').classList.add('anim-auto-lock');
        }

        // 切换标签页
        function switchView(view) {
            currentView = view;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.className = 'tab-btn px-5 py-2 rounded-lg text-gray-400 hover:text-white hover:bg-[#313244] font-medium transition-colors';
            });
            const activeBtn = document.getElementById(`tab-${view}`);
            if(activeBtn) {
                activeBtn.className = 'tab-btn px-5 py-2 rounded-lg bg-blue-600 text-white font-bold shadow-[0_0_10px_rgba(37,99,235,0.4)] transition-colors';
            }
            renderCurrentView();
        }

        // 获取阶级 CSS
        function getTierBarClass(tier) {
            if(tier.includes('棱彩') || tier.includes('彩色') || tier === 'Prismatic') return 'tier-prismatic';
            if(tier.includes('金') || tier === 'Gold') return 'tier-gold';
            return 'tier-silver';
        }

        // 渲染单行卡片 HTML
        function createHextechCard(hextech, index) {
            const iconUrl = hextech.icon || `https://raw.communitydragon.org/latest/plugins/rcp-be-lolgame-data/global/default/v1/hextech-images/chest.png`;
            const tierClass = getTierBarClass(hextech.海克斯阶级);

            let rankColor = 'text-gray-500 font-bold';
            if(index === 0) rankColor = 'text-yellow-400 font-black text-base drop-shadow-md';
            else if(index === 1) rankColor = 'text-gray-300 font-bold';
            else if(index === 2) rankColor = 'text-amber-600 font-bold';

            const wr = (hextech.海克斯胜率 * 100).toFixed(1) + '%';
            const pr = (hextech.海克斯出场率 * 100).toFixed(1) + '%';

            return `
            <div class="list-row flex items-center justify-between p-2 border-b border-white/5">
                <div class="flex items-center space-x-3 w-[55%]">
                    <span class="${rankColor} w-4 text-right italic">${index + 1}</span>
                    <div class="w-1.5 h-8 rounded-full ${tierClass} shrink-0"></div>
                    <img src="${iconUrl}"
                         alt="${hextech.海克斯名称}"
                         loading="lazy"
                         onerror="this.src='https://raw.communitydragon.org/latest/plugins/rcp-be-lolgame-data/global/default/v1/hextech-images/chest.png'; this.onerror=null;"
                         class="w-8 h-8 rounded-md border border-gray-700 shadow-sm object-cover bg-gray-900 shrink-0">
                    <span class="font-bold text-gray-200 truncate text-sm">${hextech.海克斯名称}</span>
                </div>
                <div class="w-[20%] text-right font-mono text-green-400 font-bold">${wr}</div>
                <div class="w-[25%] text-right font-mono text-gray-400">${pr}</div>
            </div>
            `;
        }

        // 渲染视图数据
        function renderCurrentView() {
            if (!hextechData) return;
            const compList = document.getElementById('compList');
            const winList = document.getElementById('winList');
            const dataContainer = document.getElementById('dataContainer');
            const noDataTip = document.getElementById('noDataTip');

            let leftData = [];
            let rightData = [];

            if (currentView === 'all') {
                leftData = hextechData.top_10_overall || [];
                rightData = hextechData.winrate_only || [];
            } else {
                const tierData = hextechData[currentView] || [];
                leftData = tierData.slice().sort((a, b) => (b.综合得分 || 0) - (a.综合得分 || 0));
                rightData = tierData.slice().sort((a, b) => b.海克斯胜率 - a.海克斯胜率);
            }

            leftData = leftData.slice(0, 10);
            rightData = rightData.slice(0, 10);

            if (leftData.length === 0 && rightData.length === 0) {
                dataContainer.classList.add('hidden');
                noDataTip.classList.remove('hidden');
            } else {
                noDataTip.classList.add('hidden');
                dataContainer.classList.remove('hidden');
                compList.innerHTML = leftData.map((h, i) => createHextechCard(h, i)).join('');
                winList.innerHTML = rightData.map((h, i) => createHextechCard(h, i)).join('');
            }
        }

        // API 数据请求
        async function loadHextechs() {
            if (!hero) {
                document.getElementById('loadingSpinner').innerHTML = '<div class="text-red-400">错误：未获取到英雄名称</div>';
                return;
            }
            try {
                const res = await fetch(`${API_BASE}/api/champion/${encodeURIComponent(hero)}/hextechs`);
                hextechData = await res.json();
                document.getElementById('loadingSpinner').classList.add('hidden');
                renderCurrentView();
            } catch (err) {
                console.error(err);
                document.getElementById('loadingSpinner').classList.add('hidden');
                document.getElementById('noDataTip').classList.remove('hidden');
                document.querySelector('#noDataTip .text-xl').textContent = '数据加载失败';
            }
        }

        // WebSocket 逻辑 - 支持跨局连跳
        function connectWS() {
            ws = new WebSocket(WS_URL + '/ws');
            window.wsInstance = ws;
            const status = document.getElementById('wsStatus');
            ws.onopen = () => { status.innerHTML = '<span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span><span class="text-green-400">已连接</span>'; };
            ws.onclose = () => { status.innerHTML = '<span class="w-2 h-2 bg-red-500 rounded-full"></span><span class="text-red-400">已断开</span>'; setTimeout(connectWS, 3000); };
            ws.onmessage = (e) => {
                try {
                    const msg = JSON.parse(e.data);
                    if (msg.type === 'data_updated') {
                        console.log('收到 CSV 数据更新通知，自动热重载...');
                        loadHextechs();
                    } else if (msg.type === 'local_player_locked') {
                        // 若玩家在详情页挂机，下一局锁定新英雄时自动连跳
                        window.location.href = `detail.html?hero=${encodeURIComponent(msg.hero_name)}&id=${encodeURIComponent(msg.champion_id)}&auto=1`;
                    }
                } catch (e) {
                    console.error(e);
                }
            };
        }

        // 初始化
        window.onload = () => {
            loadHextechs();
            loadSynergies();
            connectWS();
        };

        // 加载协同数据
        async function loadSynergies() {
            const container = document.getElementById('synergyContainer');
            if (!heroId) {
                console.error('[Synergy] 未获取到英雄 ID (champ_id)');
                container.innerHTML = '<div class="text-center py-10 text-gray-400">无英雄 ID</div>';
                return;
            }
            console.log('[Synergy] 开始加载英雄协同数据，champ_id =', heroId);
            try {
                const res = await fetch(`${API_BASE}/api/synergies/${encodeURIComponent(heroId)}`);
                if (!res.ok) {
                    throw new Error(`HTTP ${res.status}: ${res.statusText}`);
                }
                const data = await res.json();
                synergyData = data.synergies || [];
                console.log('[Synergy] 加载完成，共', synergyData.length, '条记录');

                if (synergyData.length === 0) {
                    container.innerHTML = '<div class="text-center py-10 text-gray-400">暂无协同数据</div>';
                    return;
                }

                const listHtml = synergyData.map(item =>
                    `<li class="glass-panel p-3 rounded-lg text-sm text-gray-300">${escapeHtml(item)}</li>`
                ).join('');
                container.innerHTML = '<ul class="space-y-2">' + listHtml + '</ul>';
            } catch (err) {
                console.error('[Synergy] 加载协同数据失败:', err);
                container.innerHTML = '<div class="text-center py-10 text-red-400">加载失败</div>';
            }
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
