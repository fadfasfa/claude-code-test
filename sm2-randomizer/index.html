<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SM2 Randomizer | Machine Litany</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app-shell" data-sm2-app>
      <div class="app-shell__backdrop"></div>
      <header class="topbar">
        <div class="topbar__identity">
          <p class="eyebrow">SM2 RANDOMIZER / CONCEPT 02</p>
          <h1>星际战士 2 全随机抽取器</h1>
          <p class="topbar__subtitle">
            逻辑层唯一事实来源：<code>window.AppLogic.getStateSnapshot()</code>
          </p>
        </div>

        <div class="topbar__controls">
          <label class="switch-card" for="team-mode-toggle">
            <span class="switch-card__meta">
              <span class="switch-card__label">三人团队模式</span>
              <span class="switch-card__hint">切换单兵部署 / 三人编组</span>
            </span>
            <span class="toggle">
              <input id="team-mode-toggle" type="checkbox" />
              <span class="toggle__track" aria-hidden="true"></span>
            </span>
          </label>

          <label class="switch-card" for="talent-toggle">
            <span class="switch-card__meta">
              <span class="switch-card__label">天赋抽取</span>
              <span class="switch-card__hint">当前玩家独立保存，顶部主开关联动</span>
            </span>
            <span class="toggle">
              <input id="talent-toggle" type="checkbox" />
              <span class="toggle__track" aria-hidden="true"></span>
            </span>
          </label>
        </div>

        <div class="status-strip">
          <div class="status-strip__item">
            <span class="status-strip__label">模式</span>
            <strong id="mode-readout">Single Mode / Solo</strong>
          </div>
          <div class="status-strip__item">
            <span class="status-strip__label">当前玩家</span>
            <strong id="active-player-readout">Player 1</strong>
          </div>
          <div class="status-strip__item">
            <span class="status-strip__label">控制台</span>
            <strong>window.AppLogic</strong>
          </div>
        </div>

        <div class="player-tabs" id="player-tabs" aria-label="玩家切换"></div>

        <div class="action-bar">
          <button type="button" class="command-button command-button--primary" data-action="draw">
            抽取当前玩家
          </button>
          <button type="button" class="command-button" data-action="reroll">
            单人重抽
          </button>
          <button type="button" class="command-button" data-action="reset-player">
            单人重置
          </button>
          <button type="button" class="command-button command-button--danger" data-action="reset-all">
            全队重置
          </button>
        </div>
      </header>

      <main class="battle-grid">
        <section class="panel panel--class" aria-labelledby="class-panel-title">
          <div class="panel__header">
            <p class="panel__kicker">LEFT / CLASS</p>
            <h2 id="class-panel-title">职业面板</h2>
          </div>
          <div id="class-panel"></div>
        </section>

        <section class="panel panel--loadout" aria-labelledby="loadout-panel-title">
          <div class="panel__header">
            <p class="panel__kicker">CENTER / WEAPON + TALENT</p>
            <h2 id="loadout-panel-title">武装面板</h2>
          </div>
          <div id="loadout-panel"></div>
        </section>

        <section class="panel panel--modifiers" aria-labelledby="modifier-panel-title">
          <div class="panel__header">
            <p class="panel__kicker">RIGHT / GLOBAL MODIFIER</p>
            <h2 id="modifier-panel-title">全局词条</h2>
          </div>
          <div id="modifier-panel"></div>
        </section>
      </main>
    </div>

    <script src="./logic.js"></script>
  </body>
</html>
